# ============================================================
#  PC1 — MySQL Nodo 1 (Master/Replica)
#  Ejecutar en la computadora física que alojará el Nodo 1.
#  Este nodo inicializa la BD y datos (se propagan al anillo).
#  Requiere: .env con las credenciales y variables de red.
# ============================================================

services:
  mysql-node1:
    image: mysql:8.0
    container_name: mysql-node1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=ring_db
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data_node1:/var/lib/mysql
      - ./mysql-node1/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql-node1/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data_node1:
